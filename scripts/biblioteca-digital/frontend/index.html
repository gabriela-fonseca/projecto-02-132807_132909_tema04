<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Biblioteca de Filmes Digital</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <aside id="sidebarFavoritos">
    <div class="sidebar-secao">
      <h3> Favoritos</h3>
      <div id="listaFavoritos"></div>
    </div>
    <div class="sidebar-secao">
      <h3> Ver mais tarde</h3>
      <div id="listaQueroVer"></div>
    </div>
  </aside>
  <main>
    <header>
      <h1>Biblioteca Digital</h1>
    </header>

    <section id="adicionar">
      <h2>Adicionar Filme</h2>
      <input type="text" id="campoPesquisa" placeholder="Pesquisar filme no TMDB...">
      <button id="botaoPesquisar">Pesquisar</button>
      <div id="resultadosPesquisa"></div>
    </section>

    <section id="filtros">
      <input type="text" id="filtroTexto" placeholder="Filtrar biblioteca...">

      <select id="filtroGenero">
        <option value="">Todos os géneros</option>
        <option value="action">Ação</option>
        <option value="drama">Drama</option>
        <option value="comedy">Comédia</option>
        <option value="thriller">Thriller</option>
        <option value="scifi">Sci-Fi</option>
        <option value="horror">Terror</option>
        <option value="other">Outro</option>
      </select>

      <input type="number" id="filtroAnoMin" placeholder="Ano mínimo" style="width: 110px;">
      <input type="number" id="filtroAnoMax" placeholder="Ano máximo" style="width: 110px;">

      <label style="margin-left: 8px;">
        <input type="checkbox" id="filtroFavoritos">
        Favoritos
      </label>

      <button id="botaoLimparFiltros">Limpar filtros</button>
    </section>

    <section id="galeria">
      </section>
  </main>

  <div id="modalOverlay" class="modal-overlay">
    <div class="modal">
      <button id="botaoFecharModal" class="modal-fechar">✕</button>
      
      <div id="modalConteudo"></div>
      
      <div id="trailerContainer" style="display: none; margin-top: 20px;">
        <h3 style="margin-bottom: 10px;">🎥 Trailer Oficial</h3>
        <div class="video-responsive">
          <iframe 
            id="movieTrailer" 
            width="100%" 
            height="315" 
            src="" 
            title="YouTube video player" 
            frameborder="0" 
            allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" 
            allowfullscreen>
          </iframe>
        </div>
      </div>

    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
